<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wordle 3D</title>
<style>
  :root {
    --bg-top: #f5f3ef;
    --bg-bottom: #e6e2da;
    --text: #3b3a37;
    --text-soft: #8a8780;
    --green: #6aaa64;
    --yellow: #e0a83c;
    --gray: #b6b2a9;
    --key-face: #ffffff;
    --key-side: #d8d4cc;
    --tile-face: #fbfaf7;
    --tile-side: #d8d4cc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    color: var(--text);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    touch-action: manipulation;
  }
  header {
    width: 100%;
    max-width: 500px;
    text-align: center;
    padding: 14px 0 10px;
  }
  header h1 {
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text);
    text-shadow: 0 1px 0 #fff, 0 3px 6px rgba(0,0,0,0.12);
  }
  #game {
    flex: 1;
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px 0;
    perspective: 900px;
  }
  /* ---------- 3D Board ---------- */
  #board-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
  }
  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 7px;
    max-height: 400px;
    aspect-ratio: 5 / 6;
    margin: 6px 0;
    transform: rotateX(6deg);
    transform-style: preserve-3d;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
    transform-style: preserve-3d;
  }
  .row.shake { animation: shake 0.5s; }
  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-6px); }
    40%, 60% { transform: translateX(6px); }
  }
  .tile {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--tile-face);
    box-shadow:
      0 4px 0 var(--tile-side),
      0 8px 14px rgba(60, 55, 45, 0.18),
      inset 0 1px 0 #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.2rem, 6vw, 1.9rem);
    font-weight: 800;
    text-transform: uppercase;
    color: var(--text);
    user-select: none;
    transform-style: preserve-3d;
  }
  .tile.filled { animation: pop 0.12s; }
  @keyframes pop {
    50% { transform: scale(1.08) translateZ(8px); }
  }
  .tile.flip { animation: flip 0.55s ease forwards; }
  @keyframes flip {
    0% { transform: rotateX(0); }
    50% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
  .tile.correct {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 0 #527e4d, 0 8px 14px rgba(82,126,77,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .tile.present {
    background: var(--yellow);
    color: #fff;
    box-shadow: 0 4px 0 #b3852f, 0 8px 14px rgba(179,133,47,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .tile.absent {
    background: var(--gray);
    color: #fff;
    box-shadow: 0 4px 0 #94908a, 0 8px 14px rgba(60,55,45,0.18), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .tile.win { animation: bounce 0.6s ease; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    35% { transform: translateY(-18px); }
    65% { transform: translateY(4px); }
  }
  /* ---------- 3D White Keyboard ---------- */
  #keyboard {
    width: 100%;
    padding: 10px 2px 16px;
    user-select: none;
    transform: rotateX(8deg);
    transform-style: preserve-3d;
  }
  .kb-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 9px;
  }
  .key {
    flex: 1;
    max-width: 44px;
    height: 52px;
    background: linear-gradient(180deg, #ffffff, #f3f1ec);
    border: none;
    border-radius: 9px;
    color: var(--text);
    font-size: clamp(0.8rem, 3.2vw, 1rem);
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 5px 0 var(--key-side),
      0 9px 14px rgba(60, 55, 45, 0.22),
      inset 0 1px 0 #ffffff;
    transition: background 0.15s, box-shadow 0.08s, transform 0.08s;
  }
  .key:active {
    transform: translateY(4px);
    box-shadow:
      0 1px 0 var(--key-side),
      0 3px 6px rgba(60, 55, 45, 0.2),
      inset 0 1px 0 #ffffff;
  }
  .key.wide { max-width: 70px; flex: 1.6; font-size: 0.68rem; }
  .key.correct {
    background: linear-gradient(180deg, #7cbb75, var(--green));
    color: #fff;
    box-shadow: 0 5px 0 #527e4d, 0 9px 14px rgba(82,126,77,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .key.present {
    background: linear-gradient(180deg, #ecb851, var(--yellow));
    color: #fff;
    box-shadow: 0 5px 0 #b3852f, 0 9px 14px rgba(179,133,47,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .key.absent {
    background: linear-gradient(180deg, #c2beb5, var(--gray));
    color: #fff;
    box-shadow: 0 5px 0 #94908a, 0 9px 14px rgba(60,55,45,0.18), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  /* ---------- Particle canvas ---------- */
  #fx {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  /* ---------- Toast ---------- */
  #toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #3b3a37;
    color: #fff;
    font-weight: 700;
    padding: 12px 18px;
    border-radius: 10px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 70;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  /* ---------- Modal ---------- */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(60, 55, 45, 0.35);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: linear-gradient(180deg, #ffffff, #f5f3ef);
    border-radius: 18px;
    padding: 34px 30px;
    text-align: center;
    max-width: 320px;
    width: 88%;
    box-shadow: 0 10px 0 #d8d4cc, 0 24px 40px rgba(60,55,45,0.3);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { transform: translateY(24px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  #modal h2 { font-size: 1.6rem; margin-bottom: 8px; color: var(--text); }
  #modal p { color: var(--text-soft); margin-bottom: 6px; line-height: 1.45; }
  #modal .answer {
    display: inline-block;
    margin: 10px 0 18px;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--yellow);
  }
  #play-again {
    background: linear-gradient(180deg, #ecb851, var(--yellow));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 34px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    box-shadow: 0 5px 0 #b3852f, 0 10px 18px rgba(179,133,47,0.35);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  #play-again:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #b3852f, 0 4px 8px rgba(179,133,47,0.3);
  }
</style>
</head>
<body>
<header><h1>Wordle</h1></header>

<div id="game">
  <div id="board-wrap"><div id="board"></div></div>
  <div id="keyboard"></div>
</div>

<canvas id="fx"></canvas>
<div id="toast"></div>

<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-msg"></p>
    <div class="answer" id="modal-answer"></div>
    <br>
    <button id="play-again">Play Again</button>
  </div>
</div>

<script>
(() => {
  // ---------- WORD LIST (answers; all are also valid guesses) ----------
  const WORDS = ("about,above,abuse,actor,acute,admit,adopt,adult,after,again,agent,agree,ahead,alarm,album,alert,alike,alive,allow,alone,along,alter,among,anger,angle,angry,apart,apple,apply,arena,argue,arise,armor,array,arrow,aside,asset,audio,audit,avoid,awake,award,aware,badly,baker,basic,basis,beach,beard,beast,began,begin,being,below,bench,berry,birth,black,blade,blame,blank,blast,blaze,bleed,blend,bless,blind,block,blood,bloom,board,boast,bonus,boost,booth,bound,brain,brand,brave,bread,break,breed,brick,bride,brief,bring,broad,broke,brown,brush,build,built,bunch,burst,buyer,cabin,cable,candy,cargo,carry,catch,cause,chain,chair,chalk,champ,chaos,charm,chart,chase,cheap,cheat,check,cheek,cheer,chess,chest,chief,child,chill,china,choir,chose,civil,claim,clash,class,clean,clear,clerk,click,cliff,climb,clock,close,cloth,cloud,coach,coast,colon,color,couch,could,count,court,cover,crack,craft,crane,crash,crazy,cream,crime,crisp,cross,crowd,crown,crude,cruel,crush,curve,cycle,daily,dairy,dance,dealt,death,debut,decay,delay,delta,dense,depth,devil,diary,dirty,dodge,doing,donor,doubt,dozen,draft,drain,drama,drank,dream,dress,dried,drift,drill,drink,drive,drove,drown,dryer,dying,eager,eagle,early,earth,eight,elbow,elder,elect,elite,empty,enemy,enjoy,enter,entry,equal,error,essay,event,every,exact,exist,extra,fable,faith,false,fancy,fatal,fault,favor,feast,fence,fever,fiber,field,fifth,fifty,fight,final,first,fixed,flame,flash,fleet,flesh,float,flock,flood,floor,flour,fluid,flush,focus,force,forge,forth,forty,forum,found,frame,fraud,fresh,front,frost,fruit,fully,funny,gauge,ghost,giant,given,glass,globe,glory,glove,going,grace,grade,grain,grand,grant,grape,graph,grasp,grass,grave,great,greed,green,greet,grief,grill,grind,gross,group,grove,grown,guard,guess,guest,guide,guilt,habit,happy,harsh,haste,heart,heavy,hello,hence,hobby,honey,honor,horse,hotel,house,human,humor,hurry,ideal,image,imply,index,inner,input,irony,issue,ivory,jeans,jelly,jewel,joint,judge,juice,knife,knock,known,label,labor,large,laser,later,laugh,layer,learn,lease,least,leave,legal,lemon,level,light,limit,linen,liver,local,logic,loose,lover,lower,loyal,lucky,lunar,lunch,lying,magic,major,maker,maple,march,match,maybe,mayor,medal,media,mercy,merge,merit,metal,meter,midst,might,minor,minus,model,money,month,moral,motor,mount,mouse,mouth,movie,music,naive,nasty,naval,nerve,never,newly,night,noble,noise,north,novel,nurse,occur,ocean,offer,often,olive,onion,opera,orbit,order,organ,other,ought,outer,owner,oxide,ozone,paint,panel,panic,paper,party,pasta,patch,pause,peace,pearl,penny,phase,phone,photo,piano,piece,pilot,pitch,pizza,place,plain,plane,plant,plate,plaza,point,polar,pound,power,press,price,pride,prime,print,prior,prize,proof,proud,prove,pulse,punch,pupil,queen,query,quest,queue,quick,quiet,quite,quote,radar,radio,raise,rally,ranch,range,rapid,ratio,reach,react,ready,realm,rebel,refer,reign,relax,relay,reply,rider,ridge,rifle,right,rigid,risky,rival,river,roast,robot,rocky,rough,round,route,royal,rugby,ruler,rural,salad,sales,sauce,scale,scene,scent,scope,score,scout,scrap,screw,sense,serve,seven,shade,shaft,shake,shall,shame,shape,share,shark,sharp,sheep,sheet,shelf,shell,shift,shine,shiny,shirt,shock,shoot,shore,short,shout,shown,sight,silly,since,sixth,sixty,skill,skull,slate,sleep,slice,slide,slope,small,smart,smell,smile,smoke,snake,solar,solid,solve,sorry,sound,south,space,spare,spark,speak,speed,spell,spend,spice,spike,spine,spite,split,spoke,sport,spray,squad,stack,staff,stage,stain,stair,stake,stand,stare,start,state,steak,steal,steam,steel,steep,steer,stick,stiff,still,stock,stone,stood,store,storm,story,stove,strap,straw,strip,stuck,study,stuff,style,sugar,suite,sunny,super,surge,swear,sweat,sweep,sweet,swift,swing,sword,table,taken,taste,teach,teeth,tempo,tenth,thank,theft,theme,there,these,thick,thief,thing,think,third,those,three,threw,throw,thumb,tiger,tight,tired,title,toast,today,token,topic,torch,total,touch,tough,tower,toxic,trace,track,trade,trail,train,trait,treat,trend,trial,tribe,trick,troop,truck,truly,trunk,trust,truth,tutor,twice,twist,ultra,uncle,under,union,unite,unity,until,upper,upset,urban,usage,usual,valid,value,vapor,vault,venue,verse,video,villa,virus,visit,vital,vivid,vocal,voice,voter,wagon,waist,waste,watch,water,weary,weigh,weird,whale,wheat,wheel,where,which,while,white,whole,whose,widow,width,witch,woman,women,world,worry,worse,worst,worth,would,wound,woven,wrist,write,wrong,wrote,yacht,yield,young,youth,zebra").split(",");
  const WORD_SET = new Set(WORDS);

  const ROWS = 6, COLS = 5;
  const FLIP_TIME = 300; // ms per tile stagger

  let answer, grid, curRow, curCol, gameOver, animating;

  const boardEl = document.getElementById("board");
  const kbEl = document.getElementById("keyboard");
  const toastEl = document.getElementById("toast");
  const overlayEl = document.getElementById("modal-overlay");

  // ---------- Particle system ----------
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");
  let particles = [];
  let fxRunning = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  const WARM = ["#ffb347", "#ffcc33", "#ff9a1f", "#ffd966", "#f5a623"]; // orange/yellow
  const RED  = ["#e74c3c", "#ff6b5b", "#c0392b", "#ff8a80", "#d64533"]; // red

  function burst(x, y, palette, count = 16, power = 1) {
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = (1.5 + Math.random() * 3.5) * power;
      particles.push({
        x, y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 1.5 * power,
        size: 2 + Math.random() * 4,
        life: 1,
        decay: 0.018 + Math.random() * 0.02,
        color: palette[Math.floor(Math.random() * palette.length)],
        spin: (Math.random() - 0.5) * 0.3,
        rot: Math.random() * Math.PI,
        shape: Math.random() < 0.5 ? "rect" : "circle"
      });
    }
    if (!fxRunning) { fxRunning = true; requestAnimationFrame(fxLoop); }
  }

  function burstAtEl(el, palette, count, power) {
    const r = el.getBoundingClientRect();
    burst(r.left + r.width / 2, r.top + r.height / 2, palette, count, power);
  }

  function fxLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    if (particles.length === 0) { fxRunning = false; return; }
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;        // gravity
      p.vx *= 0.99;
      p.rot += p.spin;
      p.life -= p.decay;
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      if (p.shape === "rect") {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(fxLoop);
  }

  // ---------- Build board ----------
  function buildBoard() {
    boardEl.innerHTML = "";
    for (let r = 0; r < ROWS; r++) {
      const row = document.createElement("div");
      row.className = "row";
      for (let c = 0; c < COLS; c++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.id = `tile-${r}-${c}`;
        row.appendChild(tile);
      }
      boardEl.appendChild(row);
    }
  }

  // ---------- Build keyboard ----------
  const KB_LAYOUT = [
    "qwertyuiop".split(""),
    "asdfghjkl".split(""),
    ["enter", ..."zxcvbnm".split(""), "back"]
  ];
  function buildKeyboard() {
    kbEl.innerHTML = "";
    KB_LAYOUT.forEach(rowKeys => {
      const row = document.createElement("div");
      row.className = "kb-row";
      rowKeys.forEach(k => {
        const btn = document.createElement("button");
        btn.className = "key" + (k.length > 1 ? " wide" : "");
        btn.dataset.key = k;
        btn.textContent = k === "back" ? "⌫" : k;
        btn.addEventListener("click", () => handleKey(k));
        row.appendChild(btn);
      });
      kbEl.appendChild(row);
    });
  }

  // ---------- Game logic ----------
  function newGame() {
    answer = WORDS[Math.floor(Math.random() * WORDS.length)];
    grid = Array.from({ length: ROWS }, () => Array(COLS).fill(""));
    curRow = 0; curCol = 0;
    gameOver = false; animating = false;
    overlayEl.classList.remove("show");
    particles = [];
    buildBoard();
    buildKeyboard();
  }

  function handleKey(key) {
    if (gameOver || animating) return;
    if (key === "enter") return submitGuess();
    if (key === "back") {
      if (curCol > 0) {
        curCol--;
        grid[curRow][curCol] = "";
        const t = tile(curRow, curCol);
        t.textContent = "";
        t.classList.remove("filled");
      }
      return;
    }
    if (/^[a-z]$/.test(key) && curCol < COLS) {
      grid[curRow][curCol] = key;
      const t = tile(curRow, curCol);
      t.textContent = key;
      t.classList.add("filled");
      // warm spark on every typed letter
      burstAtEl(t, WARM, 8, 0.6);
      curCol++;
    }
  }

  function submitGuess() {
    const guess = grid[curRow].join("");
    if (guess.length < COLS) return rejectRow("Not enough letters");
    if (!WORD_SET.has(guess)) return rejectRow("Not in word list");

    const result = evaluate(guess, answer);
    animating = true;
    const rowIdx = curRow;

    result.forEach((state, c) => {
      const t = tile(rowIdx, c);
      setTimeout(() => {
        t.classList.add("flip");
        setTimeout(() => {
          t.classList.add(state);
          // orange/yellow burst as each guessed letter reveals
          burstAtEl(t, WARM, 14, 1);
        }, 250); // mid-flip color swap
      }, c * FLIP_TIME);
    });

    setTimeout(() => {
      result.forEach((state, c) => colorKey(guess[c], state));
      animating = false;
      if (guess === answer) {
        gameOver = true;
        for (let c = 0; c < COLS; c++) {
          setTimeout(() => {
            const t = tile(rowIdx, c);
            t.classList.add("win");
            burstAtEl(t, WARM, 22, 1.4);
          }, c * 80);
        }
        const praise = ["Genius!", "Magnificent!", "Impressive!", "Splendid!", "Great!", "Phew!"][rowIdx];
        setTimeout(() => showModal(true, praise), 900);
      } else if (rowIdx === ROWS - 1) {
        gameOver = true;
        setTimeout(() => showModal(false), 500);
      } else {
        curRow++; curCol = 0;
      }
    }, COLS * FLIP_TIME + 300);
  }

  // Two-pass evaluation handling duplicate letters correctly
  function evaluate(guess, ans) {
    const result = Array(COLS).fill("absent");
    const remaining = {};
    for (let i = 0; i < COLS; i++) {
      if (guess[i] === ans[i]) result[i] = "correct";
      else remaining[ans[i]] = (remaining[ans[i]] || 0) + 1;
    }
    for (let i = 0; i < COLS; i++) {
      if (result[i] !== "correct" && remaining[guess[i]] > 0) {
        result[i] = "present";
        remaining[guess[i]]--;
      }
    }
    return result;
  }

  function rejectRow(msg) {
    showToast(msg);
    const rowEl = boardEl.children[curRow];
    rowEl.classList.remove("shake");
    void rowEl.offsetWidth; // restart animation
    rowEl.classList.add("shake");
    // red particle bursts on every tile of the rejected row
    for (let c = 0; c < COLS; c++) {
      burstAtEl(tile(curRow, c), RED, 12, 1);
    }
  }

  // ---------- UI helpers ----------
  const RANK = { absent: 0, present: 1, correct: 2 };
  function colorKey(letter, state) {
    const btn = kbEl.querySelector(`[data-key="${letter}"]`);
    if (!btn) return;
    const cur = ["correct", "present", "absent"].find(s => btn.classList.contains(s));
    if (!cur || RANK[state] > RANK[cur]) {
      btn.classList.remove("correct", "present", "absent");
      btn.classList.add(state);
    }
  }

  function tile(r, c) { return document.getElementById(`tile-${r}-${c}`); }

  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1500);
  }

  function showModal(won, praise) {
    document.getElementById("modal-title").textContent = won ? "You Win! 🎉" : "Game Over";
    document.getElementById("modal-msg").textContent = won
      ? `${praise} You got it in ${curRow + 1} ${curRow === 0 ? "guess" : "guesses"}.`
      : "The word was:";
    document.getElementById("modal-answer").textContent = won ? "" : answer;
    document.getElementById("modal-answer").style.display = won ? "none" : "inline-block";
    overlayEl.classList.add("show");
  }

  document.getElementById("play-again").addEventListener("click", newGame);

  // Physical keyboard support
  document.addEventListener("keydown", e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    const k = e.key.toLowerCase();
    if (k === "enter") handleKey("enter");
    else if (k === "backspace") handleKey("back");
    else if (/^[a-z]$/.test(k)) handleKey(k);
  });

  newGame();
})();
</script>
</body>
</html>
